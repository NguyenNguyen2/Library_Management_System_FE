user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Upload limits — 1GB for media/large payloads
    client_max_body_size 1G;
    client_body_buffer_size 128k;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # Rate limit zones (per client IP)
    #   api_limit  : 20 req/s burst 40 — general API
    #   auth_limit : 5  req/m burst 5  — login/refresh-token
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_req_status 429;

    # Global resolver for Docker DNS
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    include /etc/nginx/conf.d/staging/*.conf;
    include /etc/nginx/conf.d/prod/*.conf;
}
