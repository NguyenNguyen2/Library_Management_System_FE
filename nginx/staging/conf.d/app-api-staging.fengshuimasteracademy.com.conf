server {
    listen 80;
    server_name app-api-staging.fengshuimasteracademy.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name app-api-staging.fengshuimasteracademy.com;
    ssl_certificate /etc/letsencrypt/live/app-api-staging.fengshuimasteracademy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app-api-staging.fengshuimasteracademy.com/privkey.pem;
    resolver 127.0.0.11 valid=30s;
    set $upstream http://khpt-staging-be-website:4002;

    # Handle CORS preflight requests at nginx level
    location ~ ^/v1/auth/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, PUT, PATCH, POST, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Origin, X-Requested-With, ngrok-skip-browser-warning' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, PUT, PATCH, POST, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Origin, X-Requested-With, ngrok-skip-browser-warning' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
