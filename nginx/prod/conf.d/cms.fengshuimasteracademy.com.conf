server {
    listen 80;
    server_name cms.fengshuimasteracademy.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name cms.fengshuimasteracademy.com;
    ssl_certificate /etc/letsencrypt/live/cms.fengshuimasteracademy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cms.fengshuimasteracademy.com/privkey.pem;
    resolver 127.0.0.11 valid=30s;
    set $upstream http://khpt-prod-fe-admin:80;
    location / {
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
